name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # stream extra included so test_stream_processor.py and
        # test_pyarrow_integration.py actually run instead of silently
        # skipping on missing polars/pyarrow.
        pip install -e ".[dev,stream]"
        # Install BOTH models. The library defaults to en_core_web_sm
        # (so we must install it for the default code path to be tested),
        # and tests that need higher NER recall opt into en_core_web_lg
        # via spacy_model="en_core_web_lg" in their fixtures.
        python -m spacy download en_core_web_sm
        python -m spacy download en_core_web_lg

    - name: Lint with ruff
      run: ruff check allyanonimiser/ tests/

    - name: Type check with pyright
      # Strictness comes from [tool.pyright] in pyproject.toml
      # (typeCheckingMode = "basic"). The previous `--level basic` flag
      # is not valid pyright CLI syntax and made this step a no-op.
      run: pyright allyanonimiser/
      continue-on-error: true  # advisory until types are fully annotated

    - name: Run tests
      run: |
        pytest tests/ --cov=allyanonimiser --cov-report=term-missing --cov-report=xml

    - name: Upload coverage to Codecov
      # Upload once per run; full-suite coverage (replaces the old
      # coverage.yml, which only measured 4 test files).
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
