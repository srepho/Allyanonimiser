name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        # Install BOTH models. The library defaults to en_core_web_sm
        # (so we must install it for the default code path to be tested),
        # and tests that need higher NER recall opt into en_core_web_lg
        # via spacy_model="en_core_web_lg" in their fixtures.
        python -m spacy download en_core_web_sm
        python -m spacy download en_core_web_lg

    - name: Lint with ruff
      run: ruff check allyanonimiser/

    - name: Type check with pyright
      run: pyright allyanonimiser/ --level basic
      continue-on-error: true  # advisory until types are fully annotated

    - name: Run tests
      run: |
        pytest tests/ --cov=allyanonimiser --cov-report=term-missing
