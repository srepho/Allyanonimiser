name: Deploy Docs

# Builds the MkDocs site and deploys it to GitHub Pages. The site at
# https://srepho.github.io/Allyanonimiser/ previously had to be refreshed
# manually via `mkdocs gh-deploy`, which is why it drifted badly between
# releases. This workflow publishes on every push to main so the site
# matches the tip of main.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # mkdocs-git-revision-date-localized-plugin needs history to
          # compute "last updated" timestamps per page.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs + plugins
        run: pip install -r docs/requirements.txt

      - name: Build site
        run: mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
