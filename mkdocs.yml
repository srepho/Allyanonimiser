site_name: Allyanonimiser
site_description: Australian-focused PII detection and anonymization for the insurance industry
site_author: Allyanonimiser Team
repo_url: https://github.com/srepho/Allyanonimiser
repo_name: srepho/Allyanonimiser

theme:
  name: material
  palette:
    primary: blue
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github

extra_css:
  - css/extra.css

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

plugins:
  - search
  - mkdocstrings
  - git-revision-date-localized

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - Usage:
    - Analyzing Text: usage/analyzing-text.md
    - Anonymizing Text: usage/anonymizing-text.md
    - Working with DataFrames: usage/dataframes.md
  - Patterns:
    - Overview: patterns/overview.md
    - Australian Patterns: patterns/australian.md
    - Custom Patterns: patterns/custom.md
  - Advanced:
    - Anonymization Operators: advanced/anonymization-operators.md
    - Custom Operators: advanced/custom-operators.md
  - API Reference:
    - Main API: api/main.md
  - Benchmarks: benchmarks.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/srepho/Allyanonimiser
      name: Allyanonimiser on GitHub